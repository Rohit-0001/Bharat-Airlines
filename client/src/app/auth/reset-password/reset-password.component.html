<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <h2>Reset Password</h2>
      <p>Enter the OTP sent to your email and choose a new password</p>
    </div>

    <div class="alert alert-danger" *ngIf="showError">
      <span class="alert-icon"><i class="fa-solid fa-triangle-exclamation"></i></span> {{ errorMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!success" class="form-body">

      <div class="form-group">
        <label class="form-label">One-Time Password</label>
        <div class="input-wrapper">
          <span class="input-icon"><i class="fa-solid fa-hashtag"></i></span>
          <input type="text"
                 formControlName="otp"
                 class="form-control otp-field"
                 placeholder="e.g. 123456"
                 maxlength="6"
                 inputmode="numeric"
                 autocomplete="one-time-code">
        </div>
        <div class="field-error" *ngIf="form.get('otp')?.errors?.['required'] && (form.get('otp')?.touched || otpTouched)">
          OTP is required
        </div>
        <div class="field-error" *ngIf="form.get('otp')?.errors?.['pattern'] && form.get('otp')?.touched">
          Enter a valid 6-digit OTP
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-wrapper">
          <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
          <input [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 class="form-control"
                 placeholder="e.g. Abc@1234"
                 autocomplete="new-password"
                 (focus)="onPasswordInteraction()" (input)="onPasswordInteraction()">
          <button type="button" class="toggle-pw" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            <i class="fa-solid" [class.fa-eye-slash]="showPassword" [class.fa-eye]="!showPassword"></i>
          </button>
        </div>
        <div class="password-feedback" *ngIf="showPasswordHints">
          <div class="field-error" *ngFor="let msg of passwordMessages">{{ msg }}</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrapper">
          <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
          <input [type]="showConfirmPassword ? 'text' : 'password'"
                 formControlName="confirmPassword"
                 class="form-control"
                 placeholder="Re-enter your new password"
                 autocomplete="new-password">
          <button type="button" class="toggle-pw" (click)="showConfirmPassword = !showConfirmPassword" [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'">
            <i class="fa-solid" [class.fa-eye-slash]="showConfirmPassword" [class.fa-eye]="!showConfirmPassword"></i>
          </button>
        </div>
        <div class="field-error" *ngIf="form.get('confirmPassword')?.errors?.['required'] && form.get('confirmPassword')?.touched">
          Please confirm your password
        </div>
      </div>

      <div class="field-error mismatch" *ngIf="form.errors?.['mismatch'] && form.get('confirmPassword')?.touched">
        <i class="fa-solid fa-triangle-exclamation"></i> Passwords do not match
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span class="spinner-border spinner-border-sm" *ngIf="loading" role="status" aria-hidden="true"></span>
        <span>{{ loading ? 'Resetting...' : 'Reset Password' }}</span>
      </button>

    </form>

    <div *ngIf="success" class="success-box">
      <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
      <p>Password reset successful!</p>
      <p class="hint">You can now sign in with your new password.</p>
    </div>

    <div class="auth-footer">
      <a routerLink="/login">← Back to Login</a>
    </div>

  </div>
</div>
