<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card p-4 shadow" style="width: 400px;">
    <h4 class="text-center mb-1">✈ CREATE ACCOUNT</h4>
    <p class="text-center text-muted mb-3">Please enter your details</p>

    <div class="alert alert-success" *ngIf="showMessage">{{ responseMessage }}</div>
    <div class="alert alert-danger" *ngIf="showError">{{ errorMessage }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" formControlName="username" placeholder="admin">
        <div class="text-danger small" *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">
          Username is required
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="admin@gmail.com">
        <div class="text-danger small" *ngIf="registerForm.get('email')?.errors?.['required'] && registerForm.get('email')?.touched">
          Email is required
        </div>
        <div class="text-danger small" *ngIf="registerForm.get('email')?.errors?.['email'] && registerForm.get('email')?.touched">
          Enter a valid email
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="••••••••">
        <div class="text-danger small" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password is required
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Contact Number</label>
        <input type="number" class="form-control" formControlName="contactNumber" placeholder="1234567890">
      </div>

      <div class="mb-3">
        <label class="form-label">Role</label>
        <select class="form-select" formControlName="role">
          <option value="PASSENGER">PASSENGER</option>
          <option value="PILOT">PILOT</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>

    <p class="text-center mt-3">
      Already have an account? <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
