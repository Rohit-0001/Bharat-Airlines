<div class="mt-3" *ngIf="seatMap.length > 0">
  <h6>Select a Seat</h6>
  <div *ngFor="let row of seatMap" class="d-flex gap-2 mb-2">
    <button
      *ngFor="let seat of row"
      type="button"
      class="btn btn-sm"
      [class.btn-success]="!seat.booked && seat.seatNumber !== selectedSeatNumber"
      [class.btn-warning]="seat.seatNumber === selectedSeatNumber"
      [class.btn-danger]="seat.booked"
      [disabled]="seat.booked"
      (click)="selectSeat(seat)"
      title="{{ seat.seatNumber }}">
      {{ seat.seatNumber }}
    </button>
  </div>
  <small class="text-muted">
    <span class="badge bg-success me-1">Available</span>
    <span class="badge bg-warning text-dark me-1">Selected</span>
    <span class="badge bg-danger me-1">Booked</span>
  </small>
</div>
