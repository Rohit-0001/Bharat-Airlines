<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-icon"><i class="fa-solid fa-key"></i></div>
      <h2>Forgot Password</h2>
      <p>Enter your email to receive a reset link</p>
    </div>

    <div class="alert alert-danger" *ngIf="showError"><i class="fa-solid fa-triangle-exclamation"></i> {{ errorMessage }}</div>

    <ng-container *ngIf="!success">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-body">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
            <input type="email" class="form-control" formControlName="email" placeholder="you@email.com">
          </div>
          <div class="field-error" *ngIf="form.get('email')?.errors?.['required'] && form.get('email')?.touched">Email is required</div>
          <div class="field-error" *ngIf="form.get('email')?.errors?.['email'] && form.get('email')?.touched">Enter a valid email</div>
        </div>
        <button type="submit" class="btn-primary" [disabled]="loading">
          <span class="spinner-border spinner-border-sm" *ngIf="loading" role="status" aria-hidden="true"></span>
          <span>{{ loading ? 'Sending...' : 'Send Reset Link' }}</span>
        </button>
      </form>
    </ng-container>

    <ng-container *ngIf="success">
      <div class="success-box">
        <div class="success-icon"><i class="fa-solid fa-envelope-open-text"></i></div>
        <p>If an account exists for that email, a password reset link has been sent.</p>
        <p class="hint">Check your inbox and spam folder.</p>
      </div>
    </ng-container>

    <div class="auth-footer">
      <a routerLink="/login">← Back to Login</a>
    </div>
  </div>
</div>
